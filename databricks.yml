# Databricks Asset Bundle for the platform-management toolkit.
# Docs: https://docs.databricks.com/dev-tools/bundles/
#
# Workspace swappability: the workspace URL exists in exactly ONE place — the
# workspace.host below. It CANNOT be a ${var.…} reference: the CLI rejects
# interpolation for fields that configure authentication ("Variable
# interpolation is not supported for fields that configure authentication").
# Point this bundle at a different workspace with the CLI's documented runtime
# override instead — an env var or a profile:
#   DATABRICKS_HOST=https://adb-<id>.<n>.azuredatabricks.net databricks bundle deploy
#   databricks bundle deploy -p <profile>
# or add another target below.

bundle:
  name: dbx-platform

workspace:
  host: https://adb-7405609799238491.11.azuredatabricks.net

include:
  - resources/*.yml

artifacts:
  default:
    type: whl
    path: .
    build: python3 -m build --wheel

variables:
  warehouse_id:
    description: >
      SQL warehouse ID used by the dashboards and system-table job tasks.
      Find one with: databricks warehouses list. Set via
      BUNDLE_VAR_warehouse_id or --var warehouse_id=...
    default: ""

  notification_email:
    description: Recipient for job failure notifications.
    default: huyydo@gmail.com

targets:
  # Development: resources prefixed with "[dev <user>]", all schedules paused,
  # deployed under your user folder. Safe to iterate.
  dev:
    default: true
    mode: development

  # Production: real names, active schedules, shared root path.
  # CI deploys here as github-actions-dbx-platform via keyless OIDC. To make
  # scheduled jobs run as it too, rather than as a human (see docs/cloud-setup.md):
  #   run_as:
  #     service_principal_name: b74a6820-d0ac-454f-8c32-02141cba3c8a
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
