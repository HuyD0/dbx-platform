# Databricks Asset Bundle for the platform-management toolkit.
# Docs: https://docs.databricks.com/dev-tools/bundles/
#
# Workspace swappability: the workspace URL exists in exactly ONE place — the
# workspace.host below. It CANNOT be a ${var.…} reference: the CLI rejects
# interpolation for fields that configure authentication ("Variable
# interpolation is not supported for fields that configure authentication").
# Point this bundle at a different workspace with the CLI's documented runtime
# override instead — an env var or a profile:
#   DATABRICKS_HOST=https://adb-<id>.<n>.azuredatabricks.net databricks bundle deploy
#   databricks bundle deploy -p <profile>
# or add another target below.

bundle:
  name: dbx-platform

workspace:
  host: https://adb-7405609799238491.11.azuredatabricks.net

include:
  - resources/*.yml

# Bundle sync respects .gitignore, but the Platform Console app installs
# dbx-platform from wheels the deploy workflow stages into its (git-ignored)
# source dir, and serves the SPA from the (git-ignored) static/ build the
# deploy workflow produces. Re-include both or the app breaks on deploy.
sync:
  include:
    - apps/platform-console/wheels/**/*.whl
    - apps/platform-console/static/**
    - apps/platform-console/build_info.json

artifacts:
  default:
    type: whl
    path: .
    # The deploy workflow installs build into the uv-managed environment;
    # invoke it through uv so the bundle's artifact builder uses that same env.
    build: uv run python -m build --wheel

variables:
  platform_console_name:
    description: >
      Stable Databricks App resource name shared with the out-of-band runtime
      controller. Keeping this as configuration avoids an App ↔ controller Job
      dependency cycle while preserving an exact, non-discovered target.
    default: platform-console

  chat_model:
    description: >
      Databricks-hosted foundation-model endpoint queried by the read-only
      Mission Control assistant. The App receives only CAN_QUERY through its
      resource binding.
    default: databricks-claude-sonnet-4-5

  actions_enabled:
    description: >
      Enables approval and executor submission in the Platform Console. Keep
      false through proposal-only validation; setting true does not bypass any
      immutable-plan, identity, TTL, drift, or executor checks.
    default: "false"

  control_plane_catalog:
    description: Unity Catalog catalog containing the durable Mission Control tables.
    default: dbx_dev

  control_plane_schema:
    description: Unity Catalog schema containing the durable Mission Control tables.
    default: dbx_platform

  notification_email:
    description: Recipient for job failure notifications.
    default: huyydo@gmail.com

  approver_group:
    description: >
      Workspace group allowed to review and approve exact Mission Control
      action plans and launch the out-of-band power controller.
    default: dbx-platform-approvers

  approver_group_id:
    description: >
      Exact SCIM ID of dbx-platform-approvers. The least-privileged action
      executor compares this immutable value with the resolved user's current
      memberships without enumerating the workspace group directory.
    default: ""

  operator_group:
    description: >
      Account group allowed to create immutable Mission Control proposals.
      Security-definer procedures re-check this membership at every write.
    default: dbx-platform-operators

  runtime_executor_service_principal_name:
    description: >
      Application/client ID of the dedicated, least-privileged service
      principal that runs the power controller. This deliberately has no
      default: a deployment must explicitly name the executor identity.

  action_executor_service_principal_name:
    description: >
      Application/client ID of the separate remediation executor. It must not
      be the runtime controller identity and receives only the permissions for
      explicitly enabled non-runtime action packs.

  azure_subscription_id:
    description: >
      Azure subscription whose bill the azure-cost jobs pull via the Cost
      Management Query API. The job identity needs the Cost Management Reader
      role on it (see docs/cloud-setup.md). Set via
      BUNDLE_VAR_azure_subscription_id.
    default: ""

  azure_service_credential:
    description: >
      Unity Catalog service credential name used for keyless Azure auth from
      scheduled jobs (see docs/secrets.md). Empty falls back to
      DefaultAzureCredential, which only works locally.
    default: ""

  azure_ai_subscriptions:
    description: >
      Comma-separated Azure subscription IDs the ai-catalog-sync job
      inventories via Azure Resource Graph. The job identity needs the Reader
      role on each listed subscription. Empty means every subscription the
      identity can read (see docs/cloud-setup.md). Set via
      BUNDLE_VAR_azure_ai_subscriptions.
    default: ""

targets:
  # Development: resources prefixed with "[dev <user>]", all schedules paused,
  # deployed under your user folder. Safe to iterate.
  dev:
    default: true
    mode: development

  # Production: real names, schedules deployed paused, identity-owned root.
  # The power controller proposes reconciliation; a human approves the exact
  # plan before the warehouse's ON/SLEEPING state is restored. The Platform
  # Console app is the exception: it deploys started: true (resources/app.yml),
  # so CI starts it directly on deploy without an approved plan.
  # CI deploys here as github-actions-dbx-platform via keyless OIDC. To make
  # scheduled jobs run as it too, rather than as a human (see docs/cloud-setup.md):
  #   run_as:
  #     service_principal_name: b74a6820-d0ac-454f-8c32-02141cba3c8a
  prod:
    mode: production
    workspace:
      # Keep controller source out of /Workspace/Shared, which is writable by
      # every workspace user and would undermine immutable-plan execution.
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      # Preserve the existing production deployment lineage while source and
      # artifacts move to the identity-owned root. Move the state itself only
      # through a separately rehearsed bundle-state migration.
      state_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}/state
