# Daily cost & usage report. Tasks run the same CLI you use locally:
#   dbx-platform cost report / dbx-platform cost top-jobs
resources:
  jobs:
    cost_usage_report:
      name: "[dbx-platform] cost-usage-report"
      description: >
        Daily DBU/list-cost report by SKU and workspace, plus the most
        expensive jobs. Utilization tasks additionally persist their findings
        to platform_findings (append-only telemetry) inside the attested
        scheduled context; everything else is read-only.
      parameters:
        - name: approved_action_id
          default: ""
        - name: approved_plan_hash
          default: ""
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"  # daily 07:00 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: usage_by_sku
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["cost", "report", "--days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: top_jobs_by_cost
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["cost", "top-jobs", "--days", "30", "--limit", "20",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: cluster_utilization
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["cost", "cluster-utilization", "--days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--store-findings",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
        - task_key: failed_run_waste
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["cost", "failed-run-waste", "--days", "30", "--limit", "20",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: warehouse_utilization
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["cost", "warehouse-utilization", "--days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--store-findings",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
