# AI/BI (Lakeview) dashboards, adapted from the community suite
# github.com/mohanab89/databricks-dashboard-suite (see README attribution).
#
# Before first use, provision the helper functions/tables the dashboards
# query (defaults to main.dbx_platform):
#   dbx-platform dashboards setup --warehouse-id <id>
# If you change the catalog/schema, re-render and commit:
#   dbx-platform dashboards render --catalog <c> --schema <s>
resources:
  dashboards:
    unified_cost_analysis:
      display_name: "[dbx-platform] Unified Cost Analysis"
      file_path: ../dashboards/unified_cost_analysis.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    job_operations_cost:
      display_name: "[dbx-platform] Job Operations & Cost Management"
      file_path: ../dashboards/job_operations_cost.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    dbsql_cost_performance:
      display_name: "[dbx-platform] DBSQL Cost & Query Performance"
      file_path: ../dashboards/dbsql_cost_performance.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false

    lineage_catalog_utilization:
      display_name: "[dbx-platform] Data Lineage & Catalog Utilization"
      file_path: ../dashboards/lineage_catalog_utilization.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false
