# Daily housekeeping report. REPORT-ONLY on schedule: no --apply here.
# Review the run output, then act locally with e.g.
#   dbx-platform housekeeping stale-clusters --apply --yes
resources:
  jobs:
    housekeeping_report:
      name: "[dbx-platform] housekeeping-report"
      description: >
        Daily report of stale/long-running clusters and jobs owned by
        missing principals. Report-only; apply actions are run manually.
      schedule:
        quartz_cron_expression: "0 30 5 * * ?"  # daily 05:30 UTC
        timezone_id: UTC
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      email_notifications:
        on_failure:
          - ${var.notification_email}
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: stale_clusters
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["housekeeping", "stale-clusters",
               "--stale-days", "30", "--max-uptime-hours", "24"]
        - task_key: orphaned_jobs
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters: ["housekeeping", "orphaned-jobs"]
        - task_key: jobs_on_all_purpose
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters: ["housekeeping", "jobs-on-all-purpose"]
