# Weekly governance drift evidence. Policy changes require an immutable
# Mission Control action; unmanaged policies are never deleted.
resources:
  jobs:
    governance_check:
      name: "[dbx-platform] governance-check"
      description: >
        Weekly cluster-policy drift report (policies/*.json in git is the
        source of truth), tag-compliance report including the share of
        spend with no cost-attribution tags, and tag-recommendation
        suggestions for resources missing required tags.
      schedule:
        quartz_cron_expression: "0 30 6 ? * MON"  # weekly Monday 06:30 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      email_notifications:
        on_failure:
          - ${var.notification_email}
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: policy_drift
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters: ["governance", "policy-sync"]
        - task_key: tag_compliance
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["governance", "tag-compliance", "--days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: tag_recommendations
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters: ["governance", "tag-recommendations"]
