# ML cost forecasting — one manual training Job and one scheduled inference Job.
#
# Training (manual, approval-gated): rolling-origin backtest of a
# seasonal-naive baseline vs LightGBM quantile models, MLflow experiment
# tracking, UC registry with @challenger on every run and @champion moved only
# through the promotion gate. It has no schedule because training/promotion is
# a stateful and potentially expensive action.
#
# Daily: rebuild features from the ingested bill -> batch inference from
# @champion into cost_forecasts -> drift + accuracy monitor (writes findings for
# in-app alerts instead of sending job-failure email).
#
# The forecast environment installs the [forecast] extras on serverless —
# they are deliberately NOT in the core wheel (see pyproject.toml).
resources:
  jobs:
    cost_forecast_train:
      name: "[dbx-platform] cost-forecast-train"
      description: >
        Approval-gated training for the Azure cost forecaster: backtest, MLflow
        experiment logging, UC registration and the champion/challenger
        promotion gate on backtest WAPE.
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      run_as:
        service_principal_name: ${var.action_executor_service_principal_name}
      permissions:
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
        - group_name: ${var.approver_group}
          level: CAN_VIEW
      parameters:
        - name: approved_action_id
          default: ""
        - name: approved_plan_hash
          default: ""
      environments:
        - environment_key: forecast
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
              - mlflow>=3.0
              - lightgbm>=4.3
              - pandas>=2.0
      tasks:
        - task_key: train_and_gate
          environment_key: forecast
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["forecast", "train",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--environment", "${bundle.target}"]

    cost_forecast_daily:
      name: "[dbx-platform] cost-forecast-daily"
      description: >
        Daily batch serving of the Azure cost forecast: feature engineering
        from azure_costs, P10/P50/P90 inference from the @champion model, and
        the PSI-drift + matured-accuracy monitor. Runs after azure-cost-pull.
      schedule:
        quartz_cron_expression: "0 15 7 * * ?"  # daily 07:15 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      parameters:
        - name: approved_action_id
          default: ""
        - name: approved_plan_hash
          default: ""
      environments:
        - environment_key: forecast
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
              - mlflow>=3.0
              - lightgbm>=4.3
              - pandas>=2.0
      tasks:
        - task_key: build_features
          environment_key: forecast
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["forecast", "build-features",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
        - task_key: predict
          depends_on:
            - task_key: build_features
          environment_key: forecast
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["forecast", "predict",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
        - task_key: monitor
          depends_on:
            - task_key: predict
          environment_key: forecast
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["forecast", "monitor",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
