# Mission Control Databricks App (FastAPI + React). Proposal-only by default.
# Verified users create/approve durable plans; the read-only app identity can
# submit only an approved action ID to governed executor Jobs. It has no target
# mutation or Unity Catalog MODIFY permission.
#
# The app installs dbx-platform from a wheel staged into
# apps/platform-console/wheels/ and serves the SPA from
# apps/platform-console/static/ — both produced by the deploy workflow.
resources:
  apps:
    platform_console:
      name: ${var.platform_console_name}
      description: "dbx-platform findings, remediation planning, AI digests, agent chat"
      source_code_path: ../apps/platform-console
      user_api_scopes:
        # Databricks Apps automatically grants the default identity scopes
        # when user authorization is enabled. Do not submit those defaults
        # explicitly: some workspaces reject them as invalid explicit scopes,
        # which prevents forwarded user identity verification at runtime.
        #
        # Required for request-scoped SQL reads/writes executed on behalf of
        # the verified user against the bundle-owned warehouse.
        - sql
      lifecycle:
        prevent_destroy: true
        # Deploy converges the app to this state, so every prod deploy starts
        # the app directly rather than leaving it stopped for an approved power
        # controller reconciliation. This intentionally lets the CI identity
        # perform a runtime start without an approval; do not flip back to
        # false expecting the app to stay off after a merge to main.
        started: true
      config:
        command: ["python", "main.py"]
        env:
          - name: DBX_PLATFORM_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: DBX_PLATFORM_POWER_CONTROLLER_JOB_ID
            value_from: power-controller
          - name: DBX_PLATFORM_ACTION_EXECUTOR_JOB_ID
            value_from: action-executor
          # Exact bundle-bound manual Jobs that Action Center may plan. These
          # remain protected/outside the Hibernate inventory.
          - name: DBX_PLATFORM_GOVERNED_MANUAL_JOB_IDS
            value_from: governed-forecast-training
          - name: DBX_PLATFORM_ENVIRONMENT
            value: ${bundle.target}
          - name: DBX_PLATFORM_APPROVER_GROUP
            value: ${var.approver_group}
          - name: DBX_PLATFORM_OPERATOR_GROUP
            value: ${var.operator_group}
          - name: DBX_PLATFORM_CONSOLE_ACTIONS
            value: ${var.actions_enabled}
      resources:
        - name: sql-warehouse
          description: Dedicated bundle-owned warehouse for Mission Control
          sql_warehouse:
            id: ${resources.sql_warehouses.platform_console_warehouse.id}
            permission: CAN_USE
        - name: power-controller
          description: >
            Submit an already approved runtime action to the out-of-band
            controller; the app service principal cannot execute it directly.
          job:
            id: ${resources.jobs.power_controller.id}
            permission: CAN_MANAGE_RUN
        - name: action-executor
          description: >
            Submit an approved non-runtime action ID to the dedicated executor;
            no execution payload is accepted from the app.
          job:
            id: ${resources.jobs.action_executor.id}
            permission: CAN_MANAGE_RUN
        - name: governed-forecast-training
          description: >
            Read the exact protected forecast-training Job definition so
            Action Center can hash and revalidate it. The App cannot run it
            directly; execution is submitted only through action-executor.
          job:
            id: ${resources.jobs.cost_forecast_train.id}
            permission: CAN_VIEW
