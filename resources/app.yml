# Platform Console — Databricks App (third surface of the same code path:
# CLI, scheduled jobs, app). FastAPI backend + React SPA. Report-only by
# default: remediation actions exist but sit behind the off-by-default
# DBX_PLATFORM_CONSOLE_ACTIONS gate in app.yaml plus a dry-run plan and a
# typed confirmation (see docs/runbook.md). Grant CAN_MANAGE_RUN on the
# report jobs after the first deploy so the Jobs page can kick them off, and
# CAN_QUERY on the platform agent's serving endpoint for the Chat page.
#
# The app installs dbx-platform from a wheel staged into
# apps/platform-console/wheels/ and serves the SPA from
# apps/platform-console/static/ — both produced by the deploy workflow.
resources:
  apps:
    platform_console:
      name: "platform-console"
      description: "dbx-platform findings, remediation planning, AI digests, agent chat"
      source_code_path: ../apps/platform-console
      resources:
        - name: sql-warehouse
          description: Warehouse for system-table queries and findings tables
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
