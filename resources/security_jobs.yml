# Weekly security evidence. PAT revocation requires an immutable approved action
# with no rollback; the direct CLI mutation path is disabled.
resources:
  jobs:
    security_audit:
      name: "[dbx-platform] security-audit"
      description: >
        Weekly PAT audit (no-expiry / over-age / expiring-soon tokens) and
        inactive-user report from system.access.audit. Report-only.
        Token listing may require an administrative entitlement; keep this pack
        disabled if the read permission cannot be granted narrowly.
      schedule:
        quartz_cron_expression: "0 0 6 ? * MON"  # weekly Monday 06:00 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: token_audit
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters: ["security", "token-audit", "--max-age-days", "90"]
        - task_key: inactive_users
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["security", "inactive-users", "--days", "90",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
