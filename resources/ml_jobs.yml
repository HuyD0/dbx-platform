# Read-only ML/serving evidence; endpoint/model changes are not executor actions
# in v1.
resources:
  jobs:
    ml_serving_report:
      name: "[dbx-platform] ml-serving-report"
      description: >
        Daily model-serving endpoint audit (state, scale-to-zero, inference
        tables, AI Gateway) plus AI/ML spend and token usage. Read-only;
        results appear in the task run output.
      schedule:
        quartz_cron_expression: "0 30 7 * * ?"  # daily 07:30 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: endpoint_audit
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["ml", "endpoint-audit", "--stale-days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: serving_cost
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["ml", "serving-cost", "--days", "30",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]

    ml_hygiene_report:
      name: "[dbx-platform] ml-hygiene-report"
      description: >
        Hourly AI/ML hygiene: model registry (stale/ownerless/unaliased
        models), interactive GPU clusters, and vector search endpoints older
        than the 15-minute idle threshold. Read-only; results appear in the
        task run output.
      schedule:
        quartz_cron_expression: "0 0 * * * ?"  # hourly
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: model_hygiene
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["ml", "model-hygiene", "--stale-days", "90",
               "--unaliased-days", "30"]
        - task_key: gpu_audit
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["ml", "gpu-audit", "--max-uptime-hours", "8",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
        - task_key: vector_search_audit
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["ml", "vector-search-audit", "--grace-minutes", "15"]
