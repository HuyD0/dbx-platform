# Weekly price snapshot for the AI solution cost estimator. Azure Retail
# Prices is a public, unauthenticated API (no service credential needed);
# $/DBU comes from system.billing.list_prices via the bundle warehouse. The
# pull writes only from its periodic run or an exact executor-approved manual
# run; estimates themselves are pure reads stamped with the snapshot date.
resources:
  jobs:
    estimator_prices_pull:
      name: "[dbx-platform] estimator-prices-pull"
      description: >
        Snapshots Azure Retail Prices API meters (matched by the git-versioned
        rate card) and Databricks $/DBU list prices into
        <catalog>.<schema>.estimator_price_snapshots, keyed by snapshot date so
        every estimate is reproducible. Unmatched required rate keys become
        cost/estimator-pricing-coverage findings (meter-rename alarm). Writes
        only to platform-owned tables.
      schedule:
        quartz_cron_expression: "0 45 5 ? * MON"  # weekly Mon 05:45 UTC, before cost jobs
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      parameters:
        - name: approved_action_id
          default: ""
        - name: approved_plan_hash
          default: ""
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: prices_pull
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["estimator", "prices-pull",
               "--region", "eastus",
               "--currency", "USD",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
        - task_key: prices_status
          depends_on:
            - task_key: prices_pull
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["estimator", "prices-status",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--environment", "${bundle.target}"]
