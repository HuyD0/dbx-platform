# Daily Azure bill ingestion. The pull writes only from its periodic run or an
# exact executor-approved manual run; report/spikes remain read-only.
# Auth: the job identity resolves a UC service credential (keyless) and needs
# Cost Management Reader on the subscription — see docs/cloud-setup.md.
resources:
  jobs:
    azure_cost_pull:
      name: "[dbx-platform] azure-cost-pull"
      description: >
        Pulls resource-group-scoped billed cost from the Azure Cost Management
        Query API and MERGEs it into <catalog>.<schema>.azure_costs. Pulls a
        rolling 3-day window so late restatements are merged on the next daily
        run. Fails closed if no resource-group allowlist is configured.
      schedule:
        quartz_cron_expression: "0 30 6 * * ?"  # daily 06:30 UTC, before cost jobs
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      parameters:
        - name: approved_action_id
          default: ""
        - name: approved_plan_hash
          default: ""
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: pull_bill
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["azure-cost", "pull", "--days", "3",
               "--subscription-id", "${var.azure_subscription_id}",
               "--resource-groups", "${var.azure_cost_resource_groups}",
               "--service-credential", "${var.azure_service_credential}",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
        - task_key: spend_spikes
          depends_on:
            - task_key: pull_bill
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["azure-cost", "spikes",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}",
               "--store-findings",
               "--approved-action-id", "{{job.parameters.approved_action_id}}",
               "--approved-plan-hash", "{{job.parameters.approved_plan_hash}}",
               "--approved-job-id", "{{job.id}}",
               "--approved-run-id", "{{job.run_id}}",
               "--trigger-type", "{{job.trigger.type}}",
               "--environment", "${bundle.target}"]
