# Provisions the helper functions and reference tables the AI/BI dashboards
# query (see resources/dashboards.yml). This is the scheduled second surface of
# the `dbx-platform dashboards setup` CLI command, per the repo's "one code path,
# two ways" invariant: the bundle deploys dashboards that read
# main.dbx_platform.{workspace_reference,warehouse_reference,job_type_from_sku,
# sql_type_from_sku,team_name_from_tags}, and this job creates/refreshes them so
# they exist on a fresh deploy instead of relying on a manual setup step.
#
# Idempotent: CREATE OR REPLACE FUNCTION / CREATE TABLE IF NOT EXISTS, plus MERGEs
# that pick up new workspaces/warehouses over time. The --catalog/--schema below
# MUST match what the rendered dashboards/*.lvdash.json reference (default
# main.dbx_platform); if you move the helpers, re-render and update both.
resources:
  jobs:
    dashboards_setup:
      name: "[dbx-platform] dashboards-setup"
      description: >
        Provisions/refreshes the dashboards' helper schema, SQL functions, and
        reference tables (workspace_reference, warehouse_reference) in
        main.dbx_platform via the Statement Execution API. Writes only its own
        UC objects; reads system.billing.usage and system.access.audit.
      schedule:
        quartz_cron_expression: "0 0 5 ? * *"  # daily 05:00 UTC
        timezone_id: UTC
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      email_notifications:
        on_failure:
          - ${var.notification_email}
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: dashboards_setup
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["dashboards", "setup",
               "--catalog", "main", "--schema", "dbx_platform",
               "--warehouse-id", "${var.warehouse_id}"]
