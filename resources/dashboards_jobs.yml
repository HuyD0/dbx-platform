# Read-only dashboard dependency monitor. Schema/function/table creation belongs
# exclusively to the unscheduled deployment bootstrap in resources/migrations.yml.
# Autonomous schedules may observe and append evidence but may not change
# configuration.
resources:
  jobs:
    dashboards_setup:
      name: "[dbx-platform] dashboard-dependency-health"
      description: >
        Read-only availability check for the dashboard helper functions and
        reference tables in main.dbx_platform. Missing dependencies are fixed
        only through the deployment migration.
      schedule:
        quartz_cron_expression: "0 0 5 ? * *"  # daily 05:00 UTC
        timezone_id: UTC
        pause_status: PAUSED
      tags:
        team: platform
        project: dbx-platform
      queue:
        enabled: true
      permissions:
        - service_principal_name: ${var.runtime_executor_service_principal_name}
          level: CAN_MANAGE
        - service_principal_name: ${var.action_executor_service_principal_name}
          level: CAN_MANAGE_RUN
        - service_principal_name: ${resources.apps.platform_console.service_principal_client_id}
          level: CAN_VIEW
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: dependency_health
          environment_key: default
          python_wheel_task:
            package_name: dbx_platform
            entry_point: dbx-platform
            parameters:
              ["dashboards", "health",
               "--catalog", "main", "--schema", "dbx_platform",
               "--warehouse-id", "${resources.sql_warehouses.platform_console_warehouse.id}"]
