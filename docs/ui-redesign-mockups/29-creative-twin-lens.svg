<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000"><style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-variant-numeric:tabular-nums}</style><rect x="0" y="0" width="1600" height="1000" rx="0" fill="#FFFFFF" stroke="none" stroke-width="1"/><rect x="0" y="0" width="1600" height="8" rx="0" fill="#E31B3D" stroke="none" stroke-width="1"/><text x="40" y="43" font-size="14" font-weight="750" fill="#2A0D18" text-anchor="start" letter-spacing="1.2">DBX / PLATFORM</text><text x="1560" y="43" font-size="11" font-weight="650" fill="#2A0D18" text-anchor="end" letter-spacing="0.9">MISSION CONTROL  ·  PRODUCTION</text><rect x="0" y="66" width="785" height="934" rx="0" fill="#FBF6F7" stroke="none" stroke-width="1"/><rect x="785" y="66" width="815" height="934" rx="0" fill="#2A0D18" stroke="none" stroke-width="1"/><rect x="775" y="66" width="10" height="934" rx="0" fill="#E31B3D" stroke="none" stroke-width="1"/><text x="52" y="125" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="start" letter-spacing="1.2">EXECUTIVE LENS</text><text x="52" y="177" font-size="36" font-weight="600" fill="#2A0D18" text-anchor="start" letter-spacing="0">Why this decision</text><text x="52" y="211" font-size="14" font-weight="430" fill="#6E6B6C" text-anchor="start" letter-spacing="0">Business consequence, control posture, and timing.</text><text x="52" y="292" font-size="66" font-weight="560" fill="#2A0D18" text-anchor="start" letter-spacing="0">+$6.2k</text><text x="286" y="288" font-size="18" font-weight="500" fill="#6E6B6C" text-anchor="start" letter-spacing="0">per month</text><text x="52" y="332" font-size="13" font-weight="500" fill="#151515" text-anchor="start" letter-spacing="0">Estimated cost of starting the production warehouse.</text><line x1="52" y1="380" x2="724" y2="380" stroke="#D9D3D3" stroke-width="1"/><text x="52" y="426" font-size="10" font-weight="700" fill="#6E6B6C" text-anchor="start" letter-spacing="0.7">CONTROL POSTURE</text><text x="52" y="461" font-size="20" font-weight="620" fill="#2A0D18" text-anchor="start" letter-spacing="0">97.4%</text><text x="282" y="426" font-size="10" font-weight="700" fill="#6E6B6C" text-anchor="start" letter-spacing="0.7">EVIDENCE</text><text x="282" y="461" font-size="20" font-weight="620" fill="#2A0D18" text-anchor="start" letter-spacing="0">18 / 18</text><text x="512" y="426" font-size="10" font-weight="700" fill="#6E6B6C" text-anchor="start" letter-spacing="0.7">EXPIRY</text><text x="512" y="461" font-size="20" font-weight="620" fill="#A51D3D" text-anchor="start" letter-spacing="0">11:48</text><rect x="52" y="526" width="672" height="274" rx="4" fill="#FFFFFF" stroke="#D9D3D3" stroke-width="1"/><text x="78" y="562" font-size="10" font-weight="750" fill="#6E6B6C" text-anchor="start" letter-spacing="0.9">DECISION MEMO</text><text x="78" y="605" font-size="21" font-weight="620" fill="#2A0D18" text-anchor="start" letter-spacing="0">Reconcile production SQL warehouse</text><text x="78" y="644" font-size="14" font-weight="430" fill="#151515" text-anchor="start" letter-spacing="0">The warehouse is stopped. Starting it restores dashboard</text><text x="78" y="670" font-size="14" font-weight="430" fill="#151515" text-anchor="start" letter-spacing="0">availability with a 10-minute auto-stop control.</text><text x="78" y="716" font-size="11" font-weight="650" fill="#6E6B6C" text-anchor="start" letter-spacing="0">Recommendation</text><text x="190" y="716" font-size="14" font-weight="650" fill="#A51D3D" text-anchor="start" letter-spacing="0">Approve after exact plan review</text><rect x="78" y="742" width="150" height="40" rx="3" fill="#A51D3D" stroke="#A51D3D" stroke-width="1"/><text x="153" y="768" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">Review plan</text><text x="830" y="125" font-size="10" font-weight="750" fill="#C5A064" text-anchor="start" letter-spacing="1.2">OPERATOR LENS</text><text x="830" y="177" font-size="36" font-weight="600" fill="#FFFFFF" text-anchor="start" letter-spacing="0">What will happen</text><text x="830" y="211" font-size="14" font-weight="430" fill="#CDBFC4" text-anchor="start" letter-spacing="0">Exact payload, identity, and fail-closed boundary.</text><rect x="830" y="258" width="718" height="150" rx="4" fill="#35131F" stroke="#684151" stroke-width="1"/><text x="856" y="292" font-size="10" font-weight="750" fill="#CDBFC4" text-anchor="start" letter-spacing="0.9">IMMUTABLE PLAN</text><text x="856" y="336" font-size="24" font-weight="650" fill="#FFFFFF" text-anchor="start" letter-spacing="0">4f92c0bd…c18a</text><rect x="856" y="358" width="147" height="29" rx="2" fill="#551827" stroke="none" stroke-width="1"/><circle cx="868" cy="373" r="3" fill="#E31B3D" stroke="none" stroke-width="1"/><text x="878" y="378" font-size="10" font-weight="700" fill="#E31B3D" text-anchor="start" letter-spacing="0.7">APPROVAL REQUIRED</text><rect x="1022" y="358" width="140" height="29" rx="2" fill="#283A2D" stroke="none" stroke-width="1"/><circle cx="1034" cy="373" r="3" fill="#4B6F52" stroke="none" stroke-width="1"/><text x="1044" y="378" font-size="10" font-weight="700" fill="#4B6F52" text-anchor="start" letter-spacing="0.7">EVIDENCE CURRENT</text><text x="830" y="464" font-size="10" font-weight="750" fill="#A9939B" text-anchor="start" letter-spacing="0.8">TARGET</text><text x="1012" y="464" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">warehouse / dbx-platform-prod</text><line x1="830" y1="488" x2="1548" y2="488" stroke="#5B3544" stroke-width="1"/><text x="830" y="526" font-size="10" font-weight="750" fill="#A9939B" text-anchor="start" letter-spacing="0.8">STATE</text><text x="1012" y="526" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">RUNNING · auto-stop 10 min</text><line x1="830" y1="550" x2="1548" y2="550" stroke="#5B3544" stroke-width="1"/><text x="830" y="588" font-size="10" font-weight="750" fill="#A9939B" text-anchor="start" letter-spacing="0.8">EXECUTOR</text><text x="1012" y="588" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">warehouse-executor</text><line x1="830" y1="612" x2="1548" y2="612" stroke="#5B3544" stroke-width="1"/><text x="830" y="650" font-size="10" font-weight="750" fill="#A9939B" text-anchor="start" letter-spacing="0.8">CREATED</text><text x="1012" y="650" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">08:29:54 EDT</text><line x1="830" y1="674" x2="1548" y2="674" stroke="#5B3544" stroke-width="1"/><rect x="830" y="742" width="718" height="150" rx="4" fill="#35131F" stroke="#684151" stroke-width="1"/><text x="856" y="776" font-size="10" font-weight="750" fill="#C5A064" text-anchor="start" letter-spacing="0.9">FAIL-CLOSED</text><text x="856" y="812" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">Hash mismatch · drift · expiry · replay</text><text x="856" y="842" font-size="14" font-weight="550" fill="#FFFFFF" text-anchor="start" letter-spacing="0">Missing identity or audit storage</text><text x="856" y="872" font-size="12" font-weight="500" fill="#CDBFC4" text-anchor="start" letter-spacing="0">Approval never executes the plan.</text><text x="52" y="936" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="start" letter-spacing="1.1">TWO LENSES  /  ONE EXACT DECISION</text></svg>