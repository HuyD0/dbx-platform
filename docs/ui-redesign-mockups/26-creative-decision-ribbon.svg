<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000"><style>text{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-variant-numeric:tabular-nums}</style><rect x="0" y="0" width="1600" height="1000" rx="0" fill="#FBF6F7" stroke="none" stroke-width="1"/><rect x="0" y="0" width="1600" height="66" rx="0" fill="#FFFFFF" stroke="none" stroke-width="1"/><rect x="0" y="0" width="12" height="1000" rx="0" fill="#E31B3D" stroke="none" stroke-width="1"/><text x="40" y="43" font-size="14" font-weight="750" fill="#2A0D18" text-anchor="start" letter-spacing="1.2">DBX / PLATFORM</text><text x="1560" y="43" font-size="11" font-weight="650" fill="#2A0D18" text-anchor="end" letter-spacing="0.9">MISSION CONTROL  ·  PRODUCTION</text><text x="62" y="120" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="start" letter-spacing="1.2">DECISION JOURNEY</text><text x="62" y="169" font-size="36" font-weight="620" fill="#2A0D18" text-anchor="start" letter-spacing="0">One plan. Six controlled states.</text><text x="62" y="201" font-size="14" font-weight="430" fill="#6E6B6C" text-anchor="start" letter-spacing="0">The interface follows the decision instead of organizing work into dashboard cards.</text><path d="M 90 294 C 300 294, 300 382, 510 382 S 720 470, 930 470 S 1140 558, 1510 558" fill="none" stroke="#2A0D18" stroke-width="34"/><path d="M 90 294 C 300 294, 300 382, 510 382 S 720 470, 930 470" fill="none" stroke="#E31B3D" stroke-width="8"/><circle cx="92" cy="294" r="29" fill="#E31B3D" stroke="#E31B3D" stroke-width="3"/><text x="92" y="299" font-size="12" font-weight="750" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">01</text><text x="92" y="224" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">EVIDENCE</text><text x="92" y="249" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">18 / 18 current</text><circle cx="340" cy="338" r="29" fill="#E31B3D" stroke="#E31B3D" stroke-width="3"/><text x="340" y="343" font-size="12" font-weight="750" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">02</text><text x="340" y="413" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">PLAN</text><text x="340" y="438" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">4f92…c18a</text><circle cx="590" cy="426" r="29" fill="#E31B3D" stroke="#E31B3D" stroke-width="3"/><text x="590" y="431" font-size="12" font-weight="750" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">03</text><text x="590" y="356" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">APPROVAL</text><text x="590" y="381" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">11:48 left</text><circle cx="838" cy="426" r="29" fill="#FFFFFF" stroke="#2A0D18" stroke-width="3"/><text x="838" y="431" font-size="12" font-weight="750" fill="#2A0D18" text-anchor="middle" letter-spacing="0">04</text><text x="838" y="501" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">CONFIRM</text><text x="838" y="526" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">separate step</text><circle cx="1088" cy="514" r="29" fill="#FFFFFF" stroke="#2A0D18" stroke-width="3"/><text x="1088" y="519" font-size="12" font-weight="750" fill="#2A0D18" text-anchor="middle" letter-spacing="0">05</text><text x="1088" y="444" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">EXECUTE</text><text x="1088" y="469" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">dedicated SP</text><circle cx="1372" cy="558" r="29" fill="#FFFFFF" stroke="#2A0D18" stroke-width="3"/><text x="1372" y="563" font-size="12" font-weight="750" fill="#2A0D18" text-anchor="middle" letter-spacing="0">06</text><text x="1372" y="482" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="middle" letter-spacing="0.9">VERIFY</text><text x="1372" y="507" font-size="13" font-weight="600" fill="#2A0D18" text-anchor="middle" letter-spacing="0">append only</text><rect x="62" y="654" width="918" height="264" rx="5" fill="#FFFFFF" stroke="#D9D3D3" stroke-width="1"/><text x="88" y="690" font-size="10" font-weight="750" fill="#A51D3D" text-anchor="start" letter-spacing="1">CURRENT STATE  /  HUMAN APPROVAL</text><text x="88" y="736" font-size="25" font-weight="620" fill="#2A0D18" text-anchor="start" letter-spacing="0">Reconcile production SQL warehouse</text><rect x="88" y="756" width="119" height="29" rx="2" fill="#F3E5E9" stroke="none" stroke-width="1"/><circle cx="100" cy="771" r="3" fill="#A51D3D" stroke="none" stroke-width="1"/><text x="110" y="776" font-size="10" font-weight="700" fill="#A51D3D" text-anchor="start" letter-spacing="0.7">EXPIRES 11:48</text><rect x="246" y="756" width="140" height="29" rx="2" fill="#EDF2ED" stroke="none" stroke-width="1"/><circle cx="258" cy="771" r="3" fill="#4B6F52" stroke="none" stroke-width="1"/><text x="268" y="776" font-size="10" font-weight="700" fill="#4B6F52" text-anchor="start" letter-spacing="0.7">EVIDENCE CURRENT</text><text x="88" y="824" font-size="11" font-weight="600" fill="#6E6B6C" text-anchor="start" letter-spacing="0">Impact</text><text x="170" y="824" font-size="14" font-weight="650" fill="#151515" text-anchor="start" letter-spacing="0">+$6.2k / month</text><text x="370" y="824" font-size="11" font-weight="600" fill="#6E6B6C" text-anchor="start" letter-spacing="0">Executor</text><text x="460" y="824" font-size="14" font-weight="650" fill="#151515" text-anchor="start" letter-spacing="0">warehouse-executor</text><rect x="88" y="854" width="176" height="40" rx="3" fill="#A51D3D" stroke="#A51D3D" stroke-width="1"/><text x="176" y="880" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0">Review exact plan</text><rect x="276" y="854" width="148" height="40" rx="3" fill="#FFFFFF" stroke="#D9D3D3" stroke-width="1"/><text x="350" y="880" font-size="12" font-weight="650" fill="#151515" text-anchor="middle" letter-spacing="0">Trace evidence</text><rect x="1004" y="654" width="534" height="264" rx="5" fill="#2A0D18" stroke="none" stroke-width="1"/><text x="1034" y="691" font-size="10" font-weight="750" fill="#CDBFC4" text-anchor="start" letter-spacing="1">CONTROL PRINCIPLE</text><text x="1034" y="741" font-size="23" font-weight="580" fill="#FFFFFF" text-anchor="start" letter-spacing="0">Approval is a state,</text><text x="1034" y="773" font-size="23" font-weight="580" fill="#FFFFFF" text-anchor="start" letter-spacing="0">not an execution event.</text><line x1="1034" y1="805" x2="1508" y2="805" stroke="#684151" stroke-width="1"/><text x="1034" y="841" font-size="13" font-weight="430" fill="#D8CDD1" text-anchor="start" letter-spacing="0">Every transition is exact, expiring,</text><text x="1034" y="867" font-size="13" font-weight="430" fill="#D8CDD1" text-anchor="start" letter-spacing="0">revalidated, and append-only.</text></svg>