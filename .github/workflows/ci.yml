name: CI

on:
  pull_request:
  push:
    branches: [main]

# Secrets are optional: lint/test/build run without any. The bundle-validate
# job authenticates to the workspace, so it is skipped (with a notice) until
# the secrets below are configured — see docs/service-principal.md.
env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
  BUNDLE_VAR_warehouse_id: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify packaged data (queries + policies ship in the wheel)
        run: |
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/usage_last_30d.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/policies/autotermination_required.json"

  bundle-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate bundle
        if: env.DATABRICKS_HOST != ''
        run: databricks bundle validate -t prod
      - name: Skipped (no workspace credentials configured)
        if: env.DATABRICKS_HOST == ''
        run: |
          echo "bundle validate skipped: DATABRICKS_HOST secret not set."
          echo "Configure DATABRICKS_HOST / DATABRICKS_CLIENT_ID / DATABRICKS_CLIENT_SECRET"
          echo "to enable workspace validation — see docs/service-principal.md."
