name: CI

on:
  pull_request:
  push:
    branches: [main]

# Auth: keyless. No secrets are needed for lint/test/build — that job stays
# credential-free so it is safe to run on PR branches. The workspace-touching
# job (bundle validate) uses azure/login OIDC + the Databricks CLI's azure-cli
# auth type, and deliberately does NOT run on pull_request: a federated
# credential must never be reachable from untrusted PR-branch code.
# See docs/cloud-setup.md.

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Test
        run: uv run pytest
      - name: Build wheel
        run: uv run python -m build --wheel
      - name: Resolve the locked Platform Console environment
        run: |
          wheel="$(basename "$(find dist -maxdepth 1 -name '*.whl' -print -quit)")"
          mkdir -p apps/platform-console/wheels
          cp "dist/$wheel" "apps/platform-console/wheels/$wheel"
          # The local wheel keeps the same name/version while its contents change.
          # Refresh it explicitly so uv records the newly built artifact hash.
          uv lock --refresh-package dbx-platform --project apps/platform-console
          uv sync --frozen --project apps/platform-console --no-install-project
          apps/platform-console/.venv/bin/python -m unittest discover \
            -s apps/platform-console/tests -v
      - name: Verify packaged data (queries + policies + estimator data ship in the wheel)
        run: |
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/usage_last_30d.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/serving_cost.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/ai_endpoint_usage_daily.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/ai_gateway_usage_daily.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/policies/autotermination_required.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/policies/gpu_training.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/estimator_data/rate_card.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/estimator_data/tiers.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/estimator_data/patterns.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/estimator_data/prompts/estimator_pattern_classify.md"
          unzip -l dist/*.whl | grep -q "dbx_platform/estimator_data/extraction_eval.jsonl"

  frontend:
    # Credential-free like lint-test-build — safe on PR branches.
    runs-on: ubuntu-latest
    # Visual baselines are generated in this exact image. Pinning its digest
    # keeps Chromium, system fonts, and rasterization stable across runner updates.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --ipc=host
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/platform-console/frontend/package-lock.json
      - name: Install
        working-directory: apps/platform-console/frontend
        run: npm ci
      - name: Install Chromium
        working-directory: apps/platform-console/frontend
        run: npx playwright install --with-deps chromium
      - name: Accessibility and interaction tests
        working-directory: apps/platform-console/frontend
        run: npm test
      - name: Typecheck and build
        working-directory: apps/platform-console/frontend
        run: npm run build
      - name: Responsive browser and visual tests
        working-directory: apps/platform-console/frontend
        run: npm run test:e2e
      - name: Upload browser test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: platform-console-playwright-report
          path: apps/platform-console/frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  bundle-validate:
    # Push/dispatch only — never on pull_request. The `production` environment
    # is what the federated credential's subject is scoped to
    # (repo:HuyD0/dbx-platform:environment:production), so a PR fork cannot
    # mint a token even if it could reach this job.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC federated login to Azure (→ Databricks azure-cli auth)
      contents: read
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-cli
      BUNDLE_VAR_actions_enabled: ${{ vars.DBX_PLATFORM_ACTIONS_ENABLED || 'false' }}
      BUNDLE_VAR_runtime_executor_service_principal_name: ${{ vars.DBX_PLATFORM_RUNTIME_EXECUTOR_SP }}
      BUNDLE_VAR_action_executor_service_principal_name: ${{ vars.DBX_PLATFORM_ACTION_EXECUTOR_SP }}
      BUNDLE_VAR_approver_group_id: ${{ vars.DBX_PLATFORM_APPROVER_GROUP_ID }}
      DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP: ${{ vars.DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC, keyless)
        # No standing client secret exists for this app registration by design.
        # Requires the federated credential on github-actions-dbx-platform whose
        # subject matches this repo's immutable OIDC prefix — see docs/cloud-setup.md.
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # No subscription-id / allow-no-subscriptions: true — this SP holds no
          # Azure RBAC by design. We only need an Entra token for the Databricks
          # resource; authorization comes from the SP's workspace membership
          # (SCIM + admins group), not from ARM. Without this, az login fails
          # with "No subscriptions found" before it can mint that token.
          allow-no-subscriptions: true
      - name: Install the Databricks CLI
        # Pinned to an immutable commit SHA rather than a floating tag/@main, so a
        # retagged or force-pushed upstream cannot silently change what runs here.
        uses: databricks/setup-cli@71b5fa6b2b94c9a543658f65ebb6b477913f8626 # v1.6.0
      - name: Verify executor identity policy
        run: bash scripts/verify_executor_identity.sh
      - name: Validate bundle
        run: databricks bundle validate -t prod
