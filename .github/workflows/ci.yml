name: CI

on:
  pull_request:
  push:
    branches: [main]

# Auth: keyless. No secrets are needed for lint/test/build — that job stays
# credential-free so it is safe to run on PR branches. The workspace-touching
# job (bundle validate) uses azure/login OIDC + the Databricks CLI's azure-cli
# auth type, and deliberately does NOT run on pull_request: a federated
# credential must never be reachable from untrusted PR-branch code.
# See docs/cloud-setup.md.

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Build wheel
        run: python -m build --wheel
      - name: Verify packaged data (queries + policies ship in the wheel)
        run: |
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/usage_last_30d.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/queries/serving_cost.sql"
          unzip -l dist/*.whl | grep -q "dbx_platform/policies/autotermination_required.json"
          unzip -l dist/*.whl | grep -q "dbx_platform/policies/gpu_training.json"

  frontend:
    # Credential-free like lint-test-build — safe on PR branches.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/platform-console/frontend/package-lock.json
      - name: Install
        working-directory: apps/platform-console/frontend
        run: npm ci
      - name: Typecheck and build
        working-directory: apps/platform-console/frontend
        run: npm run build

  bundle-validate:
    # Push/dispatch only — never on pull_request. The `production` environment
    # is what the federated credential's subject is scoped to
    # (repo:HuyD0/dbx-platform:environment:production), so a PR fork cannot
    # mint a token even if it could reach this job.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC federated login to Azure (→ Databricks azure-cli auth)
      contents: read
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-cli
      BUNDLE_VAR_warehouse_id: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC, keyless)
        # No standing client secret exists for this app registration by design.
        # Requires the federated credential on github-actions-dbx-platform whose
        # subject matches this repo's immutable OIDC prefix — see docs/cloud-setup.md.
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # No subscription-id / allow-no-subscriptions: true — this SP holds no
          # Azure RBAC by design. We only need an Entra token for the Databricks
          # resource; authorization comes from the SP's workspace membership
          # (SCIM + admins group), not from ARM. Without this, az login fails
          # with "No subscriptions found" before it can mint that token.
          allow-no-subscriptions: true
      - name: Install the Databricks CLI
        # Pinned to an immutable commit SHA rather than a floating tag/@main, so a
        # retagged or force-pushed upstream cannot silently change what runs here.
        uses: databricks/setup-cli@71b5fa6b2b94c9a543658f65ebb6b477913f8626 # v1.6.0
      - name: Validate bundle
        run: databricks bundle validate -t prod
