name: Platform triage

# Weekly findings -> rolling GitHub issue -> @claude proposes fixes as PRs.
# The agent never touches the workspace: remediation lands as reviewable git
# changes (policies/*.json, job specs), humans merge, CI deploys. --apply
# paths remain human-invoked.
#
# Auth rules (see CLAUDE.md): this job touches the workspace, so it MUST
# declare environment: production and id-token: write, and MUST NOT run on
# pull_request — a federated credential must never be reachable from
# untrusted PR-branch code.

on:
  schedule:
    - cron: "0 9 * * 1" # weekly Monday 09:00 UTC (runs its own checks — the bundle jobs stay paused)
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC federated login to Azure (→ Databricks azure-cli auth)
      contents: read
      issues: write
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-cli
      DBX_PLATFORM_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Azure login (OIDC, keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Run checks (report-only, JSON output)
        run: |
          mkdir -p findings
          dbx-platform governance policy-sync --output json > findings/policy-sync.ndjson
          dbx-platform housekeeping orphaned-jobs --output json > findings/orphaned-jobs.ndjson
          dbx-platform housekeeping jobs-on-all-purpose --output json > findings/all-purpose.ndjson
          dbx-platform cost cluster-utilization --output json > findings/cluster-util.ndjson
          dbx-platform ml endpoint-audit --output json > findings/endpoint-audit.ndjson
      - name: Upsert triage issue (@claude remediation loop)
        run: python scripts/upsert_triage_issue.py findings/*.ndjson
