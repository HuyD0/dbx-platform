name: Platform triage

# Human-dispatched findings -> rolling GitHub issue for human review.
# This workflow is deliberately unscheduled: Hibernate must not have
# any out-of-band timer capable of starting SQL compute.
# The agent never touches the workspace: remediation lands as reviewable git
# changes (policies/*.json, job specs), humans merge, CI deploys. Any resulting
# platform/configuration mutation still requires a Mission Control action.
#
# Auth rules (see CLAUDE.md): this job touches the workspace, so it MUST
# declare environment: production and id-token: write, and MUST NOT run on
# pull_request — a federated credential must never be reachable from
# untrusted PR-branch code.

on:
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC federated login to Azure (→ Databricks azure-cli auth)
      contents: read
      issues: write
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-cli
      BUNDLE_VAR_actions_enabled: ${{ vars.DBX_PLATFORM_ACTIONS_ENABLED || 'false' }}
      BUNDLE_VAR_runtime_executor_service_principal_name: ${{ vars.DBX_PLATFORM_RUNTIME_EXECUTOR_SP }}
      BUNDLE_VAR_action_executor_service_principal_name: ${{ vars.DBX_PLATFORM_ACTION_EXECUTOR_SP }}
      BUNDLE_VAR_approver_group_id: ${{ vars.DBX_PLATFORM_APPROVER_GROUP_ID }}
      DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP: ${{ vars.DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install
        run: uv sync
      - name: Azure login (OIDC, keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Install the Databricks CLI
        # Pinned to the same immutable commit as ci.yml and deploy.yml.
        uses: databricks/setup-cli@71b5fa6b2b94c9a543658f65ebb6b477913f8626 # v1.6.0
      - name: Verify executor identity policy
        run: bash scripts/verify_executor_identity.sh
      - name: Resolve the bundle-owned SQL warehouse
        # Pull the deployed bundle state and use the exact logical resource
        # key. Never search warehouses by name and never fall back to shared
        # compute. A missing deployment ID fails the workflow closed.
        run: |
          warehouse_id="$(
            databricks bundle summary -t prod --force-pull --output json |
            jq -er '.resources.sql_warehouses.platform_console_warehouse.id
              | select(type == "string" and length > 0 and (contains("${") | not))'
          )"
          printf 'DBX_PLATFORM_WAREHOUSE_ID=%s\n' "$warehouse_id" >> "$GITHUB_ENV"
      - name: Run checks (report-only, JSON output)
        run: |
          mkdir -p findings
          dbx-platform governance policy-sync --output json > findings/policy-sync.ndjson
          dbx-platform housekeeping orphaned-jobs --output json > findings/orphaned-jobs.ndjson
          dbx-platform housekeeping jobs-on-all-purpose --output json > findings/all-purpose.ndjson
          dbx-platform cost cluster-utilization --output json > findings/cluster-util.ndjson
          dbx-platform ml endpoint-audit --output json > findings/endpoint-audit.ndjson
      - name: Upsert triage issue
        run: python scripts/upsert_triage_issue.py findings/*.ndjson
