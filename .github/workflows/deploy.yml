name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recover_stale_lock:
        description: "Take over a confirmed stale Databricks bundle deployment lock"
        required: false
        type: boolean
        default: false

concurrency:
  group: bundle-deploy
  cancel-in-progress: false

# Auth: keyless — azure/login OIDC (subject
# repo:HuyD0/dbx-platform:environment:production) + the Databricks CLI's
# azure-cli auth type. No standing service-principal secret exists.
#
# Repo secrets (see docs/cloud-setup.md):
#   DATABRICKS_HOST           https://adb-<id>.<n>.azuredatabricks.net
#   AZURE_CLIENT_ID           github-actions-dbx-platform application ID
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Repository/environment variables:
#   DBX_PLATFORM_RUNTIME_EXECUTOR_SP  application ID of the dedicated
#                                     power-controller service principal
#   DBX_PLATFORM_ACTION_EXECUTOR_SP   application ID of the separate
#                                     allowlisted remediation executor
#   DBX_PLATFORM_APPROVER_GROUP_ID    immutable SCIM ID of the approver group
#
# There is no skip-when-unconfigured guard: a deploy that cannot authenticate
# must fail loudly rather than exit green having done nothing.

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # OIDC federated login to Azure (→ Databricks azure-cli auth)
      contents: read
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: azure-cli
      BUNDLE_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      BUNDLE_VAR_azure_service_credential: ${{ vars.DBX_PLATFORM_AZURE_SERVICE_CREDENTIAL }}
      BUNDLE_VAR_actions_enabled: ${{ vars.DBX_PLATFORM_ACTIONS_ENABLED || 'false' }}
      BUNDLE_VAR_runtime_executor_service_principal_name: ${{ vars.DBX_PLATFORM_RUNTIME_EXECUTOR_SP }}
      BUNDLE_VAR_action_executor_service_principal_name: ${{ vars.DBX_PLATFORM_ACTION_EXECUTOR_SP }}
      BUNDLE_VAR_approver_group_id: ${{ vars.DBX_PLATFORM_APPROVER_GROUP_ID }}
      DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP: ${{ vars.DBX_PLATFORM_ALLOW_SHARED_EXECUTOR_SP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install build tooling (the bundle builds the wheel on deploy)
        run: uv sync --extra dev
      - name: Azure login (OIDC, keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # No subscription-id / allow-no-subscriptions: true — this SP holds no
          # Azure RBAC by design. We only need an Entra token for the Databricks
          # resource; authorization comes from the SP's workspace membership
          # (SCIM + admins group), not from ARM. Without this, az login fails
          # with "No subscriptions found" before it can mint that token.
          allow-no-subscriptions: true
      - name: Install the Databricks CLI
        # Pinned to an immutable commit SHA (see ci.yml).
        uses: databricks/setup-cli@71b5fa6b2b94c9a543658f65ebb6b477913f8626 # v1.6.0
      - name: Confirm the authenticated identity
        # Cheap, explicit proof that OIDC → Databricks actually worked, so a
        # failure here is unambiguous rather than surfacing later as a
        # confusing permissions error mid-deploy.
        #
        # Runs outside the repo on purpose: non-bundle commands do NOT interpolate
        # bundle variables, so from the bundle root the CLI reads databricks.yml
        # and takes the host literally as "${var.workspace_host}" and dies. From
        # elsewhere it uses DATABRICKS_HOST. `bundle validate/deploy` below are
        # unaffected — they resolve variables properly.
        working-directory: ${{ runner.temp }}
        run: databricks current-user me
      - name: Verify executor identity policy
        run: bash scripts/verify_executor_identity.sh
      - name: Stage the wheel for the Platform Console app
        # Refresh the uv lock after staging the current wheel. Its wheel hash
        # changes on every build, invalidating the Databricks Apps environment
        # cache without making the package version commit-specific.
        # build_info.json surfaces the deployed commit in /api/health.
        run: |
          uv run python -m build --wheel
          wheel="$(basename "$(find dist -maxdepth 1 -name '*.whl' -print -quit)")"
          mkdir -p apps/platform-console/wheels
          cp "dist/$wheel" "apps/platform-console/wheels/$wheel"
          uv lock --refresh-package dbx-platform --project apps/platform-console
          printf '{"sha": "%s", "built_at": "%s"}\n' \
            "${GITHUB_SHA::7}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > apps/platform-console/build_info.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/platform-console/frontend/package-lock.json
      - name: Build the Platform Console frontend
        # Databricks Apps never run npm — the SPA is built here into the
        # git-ignored static/ dir, which databricks.yml sync.include ships.
        working-directory: apps/platform-console/frontend
        run: |
          npm ci
          npm run build
      - name: Validate
        run: databricks bundle validate -t prod
      - name: Deploy
        # Existing Lakeview dashboards have stable IDs and shared URLs. Their
        # warehouse binding cannot be changed in place by DAB, so including
        # them here would require delete/recreate. Dashboard replacement is
        # deliberately excluded until it has its own approved migration.
        #
        # Keep this allowlist explicit: production deploys may create/update
        # the app, owned jobs, and the dedicated warehouse, but must never use
        # --auto-approve to cross a destructive plan.
        env:
          RECOVER_STALE_LOCK: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_stale_lock || false }}
        run: |
          lock_args=()
          if [[ "$RECOVER_STALE_LOCK" == "true" ]]; then
            lock_args+=(--force-lock)
          fi
          databricks bundle deploy -t prod \
            "${lock_args[@]}" \
            --select apps.platform_console \
            --select sql_warehouses.platform_console_warehouse \
            --select jobs.action_executor \
            --select jobs.ai_catalog_sync \
            --select jobs.ai_monitor_rollup \
            --select jobs.azure_cost_pull \
            --select jobs.cost_forecast_daily \
            --select jobs.cost_forecast_train \
            --select jobs.cost_usage_report \
            --select jobs.dashboards_setup \
            --select jobs.governance_check \
            --select jobs.housekeeping_report \
            --select jobs.llm_cost_rollup \
            --select jobs.ml_hygiene_report \
            --select jobs.ml_serving_report \
            --select jobs.platform_digest \
            --select jobs.power_controller \
            --select jobs.schema_migrations \
            --select jobs.security_audit
      - name: Apply Mission Control schema migrations
        # Runs on serverless Spark as the deployment identity. It never starts
        # the managed SQL warehouse, so deploy-while-sleeping stays asleep.
        run: databricks bundle run schema_migrations -t prod
      - name: Reconcile the durable runtime intent (proposal only)
        # Deploy leaves schedules paused and the warehouse asleep; the app
        # declares started: true, so deploy does start it directly.
        # This unscheduled serverless controller compares exact bundle IDs with
        # the last approved ON/SLEEPING state. Drift creates a new immutable
        # AWAITING_APPROVAL plan; it never changes resource state in CI.
        run: databricks bundle run power_controller -t prod --params operation=reconcile
